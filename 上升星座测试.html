<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上升星座计算器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #6e48aa 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 {
            text-align: center;
            font-size: 1.6rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ffd700, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 0.85rem;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.9);
        }
        input, select {
            width: 100%;
            padding: 12px 15px;
            border: none;
            border-radius: 10px;
            background: rgba(255,255,255,0.15);
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }
        input:focus, select:focus {
            background: rgba(255,255,255,0.25);
            box-shadow: 0 0 0 2px rgba(255,215,0,0.3);
        }
        input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .btn {
            background: linear-gradient(45deg, #ffd700, #ff6b6b);
            color: #1a1a2e;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: scale(1.02);
        }
        .result-card {
            background: rgba(255,255,255,0.15);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            margin-top: 20px;
            border: 1px solid rgba(255,215,0,0.3);
        }
        .zodiac-icon {
            font-size: 4rem;
            margin-bottom: 10px;
        }
        .zodiac-name {
            font-size: 1.5rem;
            color: #ffd700;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .zodiac-date {
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            margin-bottom: 15px;
        }
        .zodiac-desc {
            text-align: left;
            color: rgba(255,255,255,0.9);
            line-height: 1.8;
            font-size: 0.95rem;
        }
        .info-box {
            background: rgba(255,215,0,0.1);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.8);
        }
        .info-box strong {
            color: #ffd700;
        }
        .hidden { display: none; }
        .city-select {
            margin-bottom: 15px;
        }
        .or-divider {
            text-align: center;
            margin: 15px 0;
            color: rgba(255,255,255,0.5);
            font-size: 0.85rem;
        }
        .disclaimer {
            margin-top: 20px;
            padding: 12px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.6);
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⬆️ 上升星座计算器</h1>
        <p class="subtitle">输入出生信息，精准计算你的上升星座</p>

        <div class="info-box">
            <strong>📍 什么是上升星座？</strong><br>
            出生时东方地平线上升起的星座，代表你的外在形象、第一印象和人格面具。与太阳星座（内在自我）同样重要。
        </div>

        <!-- 出生日期 -->
        <div class="form-group">
            <label>📅 出生日期</label>
            <input type="date" id="birthDate" required>
        </div>

        <!-- 出生时间 -->
        <div class="form-group">
            <label>🕐 出生时间（精确到小时）</label>
            <input type="time" id="birthTime" value="12:00" required>
        </div>

        <!-- 城市选择 -->
        <div class="form-group city-select">
            <label>🏙️ 快速选择城市（自动填充经纬度）</label>
            <select id="citySelect" onchange="fillCoordinates()">
                <option value="">-- 选择城市 --</option>
                <option value="39.9,116.4">北京</option>
                <option value="31.2,121.5">上海</option>
                <option value="23.1,113.3">广州</option>
                <option value="22.5,114.1">深圳</option>
                <option value="30.6,104.1">成都</option>
                <option value="29.6,106.5">重庆</option>
                <option value="39.1,117.2">天津</option>
                <option value="34.3,108.9">西安</option>
                <option value="36.7,117.0">济南</option>
                <option value="32.1,118.8">南京</option>
                <option value="30.3,120.2">杭州</option>
                <option value="28.2,112.9">长沙</option>
                <option value="26.1,119.3">福州</option>
                <option value="25.0,102.7">昆明</option>
                <option value="45.8,126.5">哈尔滨</option>
                <option value="41.8,123.4">沈阳</option>
                <option value="38.9,121.6">大连</option>
                <option value="43.8,87.6">乌鲁木齐</option>
                <option value="29.7,91.1">拉萨</option>
                <option value="22.3,114.2">香港</option>
                <option value="25.0,121.5">台北</option>
            </select>
        </div>

        <div class="or-divider">— 或手动输入经纬度 —</div>

        <!-- 经纬度 -->
        <div class="row">
            <div class="form-group">
                <label>📍 纬度</label>
                <input type="number" id="latitude" placeholder="如: 39.9" step="0.01" min="-90" max="90">
            </div>
            <div class="form-group">
                <label>📍 经度</label>
                <input type="number" id="longitude" placeholder="如: 116.4" step="0.01" min="-180" max="180">
            </div>
        </div>

        <button class="btn" onclick="calculateRisingSign()">计算上升星座</button>

        <!-- 结果显示 -->
        <div id="result" class="hidden"></div>

        <div class="disclaimer">
            本工具基于天文算法计算，仅供娱乐参考。精确星盘请咨询专业占星师。
        </div>
    </div>

    <script>
        // 12星座数据
        const zodiacSigns = [
            { name: '白羊座', icon: '♈', date: '3.21-4.19', element: '火', traits: '热情、直接、行动力强、有领导力、容易冲动、缺乏耐心。上升白羊给人第一印象是充满活力、积极主动、有点急躁。' },
            { name: '金牛座', icon: '♉', date: '4.20-5.20', element: '土', traits: '稳重、务实、享受生活、固执、慢热、重视安全感。上升金牛给人第一印象是温和可靠、注重品质、有点慢条斯理。' },
            { name: '双子座', icon: '♊', date: '5.21-6.21', element: '风', traits: '机智、好奇、善变、口才好、注意力分散、喜欢新鲜。上升双子给人第一印象是活泼健谈、聪明机灵、有点善变。' },
            { name: '巨蟹座', icon: '♋', date: '6.22-7.22', element: '水', traits: '敏感、顾家、情绪化、保护欲强、念旧、缺乏安全感。上升巨蟹给人第一印象是温柔亲切、有点害羞、容易亲近。' },
            { name: '狮子座', icon: '♌', date: '7.23-8.22', element: '火', traits: '自信、慷慨、爱面子、有表现欲、自尊心强、领导气质。上升狮子给人第一印象是气场强大、阳光自信、喜欢成为焦点。' },
            { name: '处女座', icon: '♍', date: '8.23-9.22', element: '土', traits: '细致、完美主义、挑剔、务实、服务意识强、容易焦虑。上升处女给人第一印象是整洁干练、谨慎细心、有点严肃。' },
            { name: '天秤座', icon: '♎', date: '9.23-10.23', element: '风', traits: '优雅、纠结、追求和谐、审美在线、依赖关系、避免冲突。上升天秤给人第一印象是温文尔雅、有品味、善于社交。' },
            { name: '天蝎座', icon: '♏', date: '10.24-11.22', element: '水', traits: '神秘、洞察力强、占有欲强、极端、有魅力、防备心重。上升天蝎给人第一印象是神秘深沉、有吸引力、不好接近。' },
            { name: '射手座', icon: '♐', date: '11.23-12.21', element: '火', traits: '乐观、自由、爱冒险、直率、缺乏耐心、哲学思维。上升射手给人第一印象是开朗豁达、热爱自由、有点大大咧咧。' },
            { name: '摩羯座', icon: '♑', date: '12.22-1.19', element: '土', traits: '务实、有野心、自律、严肃、责任感强、不善表达情感。上升摩羯给人第一印象是成熟稳重、有距离感、专业可靠。' },
            { name: '水瓶座', icon: '♒', date: '1.20-2.18', element: '风', traits: '独立、叛逆、理性、人道主义、疏离感、追求独特。上升水瓶给人第一印象是与众不同、冷静疏离、有点古怪。' },
            { name: '双鱼座', icon: '♓', date: '2.19-3.20', element: '水', traits: '敏感、浪漫、迷糊、有同情心、逃避现实、艺术气质。上升双鱼给人第一印象是温柔梦幻、有艺术感、容易相处。' }
        ];

        // 填充经纬度
        function fillCoordinates() {
            const citySelect = document.getElementById('citySelect');
            const coords = citySelect.value;
            if (coords) {
                const [lat, lng] = coords.split(',');
                document.getElementById('latitude').value = lat;
                document.getElementById('longitude').value = lng;
            }
        }

        // 计算上升星座（简化算法）
        function calculateRisingSign() {
            const date = document.getElementById('birthDate').value;
            const time = document.getElementById('birthTime').value;
            const lat = parseFloat(document.getElementById('latitude').value);
            const lng = parseFloat(document.getElementById('longitude').value);

            if (!date || !time || isNaN(lat) || isNaN(lng)) {
                alert('请填写完整的出生信息（日期、时间、经纬度）');
                return;
            }

            // 解析日期和时间
            const birthDate = new Date(date + 'T' + time);
            const month = birthDate.getMonth() + 1;
            const day = birthDate.getDate();
            const hour = birthDate.getHours();
            const minute = birthDate.getMinutes();

            // 计算太阳在黄道上的大致位置（简化）
            // 3月21日太阳在白羊座0度，每天约走1度
            const dayOfYear = getDayOfYear(birthDate);
            const sunLongitude = (dayOfYear - 80) * 0.9856; // 80是3月21日左右

            // 计算恒星时（简化）
            // 恒星时 = 太阳时 + 太阳黄经 + 经度修正
            const decimalTime = hour + minute / 60;
            const longitudeCorrection = lng / 15; // 经度转换为小时
            const siderealTime = (decimalTime + sunLongitude / 15 + longitudeCorrection) % 24;

            // 上升星座 = 恒星时对应的星座
            // 每个星座占2小时（30度 / 15度每小时）
            const ascendantIndex = Math.floor(siderealTime / 2) % 12;
            const risingSign = zodiacSigns[ascendantIndex];

            // 同时计算太阳星座
            const sunSign = getSunSign(month, day);

            // 显示结果
            showResult(risingSign, sunSign, birthDate, lat, lng);
        }

        // 获取一年中的第几天
        function getDayOfYear(date) {
            const start = new Date(date.getFullYear(), 0, 0);
            const diff = date - start;
            return Math.floor(diff / (1000 * 60 * 60 * 24));
        }

        // 获取太阳星座
        function getSunSign(month, day) {
            const dates = [20, 19, 21, 20, 21, 22, 23, 23, 23, 24, 23, 22];
            const index = day < dates[month - 1] ? month - 1 : month % 12;
            return zodiacSigns[index];
        }

        // 显示结果
        function showResult(rising, sun, birthDate, lat, lng) {
            const resultDiv = document.getElementById('result');
            resultDiv.classList.remove('hidden');

            resultDiv.innerHTML = `
                <div class="result-card">
                    <div class="zodiac-icon">${rising.icon}</div>
                    <div class="zodiac-name">上升${rising.name}</div>
                    <div class="zodiac-date">${rising.date} · ${rising.element}象星座</div>
                    <div class="zodiac-desc">
                        <strong>🌟 你的外在形象：</strong><br>
                        ${rising.traits}<br><br>
                        <strong>☀️ 你的太阳星座：${sun.name} ${sun.icon}</strong><br>
                        内在性格是${sun.name}的${sun.traits.substring(0, 30)}...<br><br>
                        <strong>💫 组合解读：</strong><br>
                        你给人的第一印象是${rising.name.substring(0, 2)}的${rising.element}象特质——${rising.traits.split('。')[0]}。
                        但熟悉之后会发现你其实是${sun.name.substring(0, 2)}的${sun.element}象内核——${sun.traits.split('。')[0]}。
                        这种"外${rising.element}内${sun.element}"的组合让你${getCombinationDesc(rising.element, sun.element)}。
                    </div>
                </div>
                <div style="background: rgba(255,255,255,0.1); border-radius: 10px; padding: 15px; margin-top: 15px; font-size: 0.85rem; color: rgba(255,255,255,0.8);">
                    <strong>📍 计算参数：</strong><br>
                    出生时间：${birthDate.toLocaleString('zh-CN')}<br>
                    经纬度：${lat.toFixed(2)}°, ${lng.toFixed(2)}°<br>
                    <small style="color: rgba(255,255,255,0.5);">注：本计算使用简化天文算法，精确星盘需专业软件</small>
                </div>
            `;
        }

        // 组合描述
        function getCombinationDesc(risingElement, sunElement) {
            const combos = {
                '火火': '内外一致，热情直率，行动力爆棚',
                '火土': '外热内稳，表面冲动实际务实',
                '火风': '外热内灵，活泼健谈思维活跃',
                '火水': '外热内敏，表面开朗内心细腻',
                '土火': '外稳内热，表面沉稳内心火热',
                '土土': '内外稳重，务实可靠极度踏实',
                '土风': '外稳内灵，表面严肃内心有趣',
                '土水': '外稳内敏，表面冷静内心柔软',
                '风火': '外灵内热，表面善变内心坚定',
                '风土': '外灵内稳，表面飘忽实际踏实',
                '风风': '内外灵动，聪明善变思维跳跃',
                '风水': '外灵内敏，表面洒脱内心敏感',
                '水火': '外敏内热，表面温柔内心火热',
                '水土': '外敏内稳，表面柔软内心坚韧',
                '水风': '外敏内灵，表面感性内心理性',
                '水水': '内外敏感，极度细腻直觉强大'
            };
            return combos[risingElement + sunElement] || '拥有独特的内外反差魅力';
        }
    </script>
</body>
</html>
